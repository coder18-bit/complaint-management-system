<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Complaint Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'style.css' %}"/>
</head>
<body style="background: linear-gradient(135deg,#1a3c5e,#2d6a9f); min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div class="card shadow-lg border-0" style="width:400px; border-radius:16px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <img src="{% static 'images/logo.png' %}" alt="Logo" height="60" onerror="this.style.display='none'"/>
        <h3 class="fw-bold mt-3" style="color:#1a3c5e;">Complaint Management</h3>
        <p class="text-muted">Sign in to your account</p>
      </div>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control form-control-lg" required autofocus/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control form-control-lg" required/>
        </div>
        <button type="submit" class="btn w-100 btn-lg fw-semibold text-white"
          style="background:#1a3c5e; border:none;">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
